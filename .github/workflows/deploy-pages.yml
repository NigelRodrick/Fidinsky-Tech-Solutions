# Requires one-time setup: repo Settings → Pages → Build and deployment → Source: GitHub Actions.
# Until that is set, Pages API calls return 404 (including the old configure-pages step).

name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble public site
        run: |
          mkdir -p _site
          cp index.html styles.css _site/
          cp -r images media _site/
          if [ -f vid.mp4 ]; then cp vid.mp4 _site/; fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Unique name avoids "Multiple artifacts named github-pages" after re-runs or upload retries.
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
